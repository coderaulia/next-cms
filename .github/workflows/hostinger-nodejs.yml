name: Hostinger Node.js

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hostinger-nodejs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Build application
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main' && secrets.HOSTINGER_DEPLOY_WEBHOOK != ''
    steps:
      - name: Trigger Hostinger deployment webhook
        env:
          HOSTINGER_DEPLOY_WEBHOOK: ${{ secrets.HOSTINGER_DEPLOY_WEBHOOK }}
          HOSTINGER_DEPLOY_TOKEN: ${{ secrets.HOSTINGER_DEPLOY_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "$HOSTINGER_DEPLOY_TOKEN" ]; then
            curl -fsSL -X POST \
              -H "Authorization: Bearer $HOSTINGER_DEPLOY_TOKEN" \
              "$HOSTINGER_DEPLOY_WEBHOOK"
          else
            curl -fsSL -X POST "$HOSTINGER_DEPLOY_WEBHOOK"
          fi
